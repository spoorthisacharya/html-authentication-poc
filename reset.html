<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Reset Password</h3>

        <form>
            <div class="mb-3">
    <label class="form-label">New Password</label>
    <input type="password" id="resetPassword" class="form-control"
           onkeyup="checkStrength('resetPassword','resetStrength')">
    <small id="resetStrength"></small>
</div>

            <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <input type="password" id="resetConfirm" class="form-control"
           onkeyup="checkMatch('resetPassword','resetConfirm','resetMatch')">
    <small id="resetMatch"></small>
</div>

            <a href="index.html" class="btn btn-success w-100">
                Update Password
            </a>
        </form>
    </div>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function checkStrength(inputId, textId) {
    let password = document.getElementById(inputId).value;
    let text = document.getElementById(textId);

    if (password.length === 0) {
        text.innerHTML = "";
    } else if (password.length < 4) {
        text.innerHTML = "Weak";
        text.style.color = "red";
    } else if (password.length < 8) {
        text.innerHTML = "Medium";
        text.style.color = "orange";
    } else {
        text.innerHTML = "Strong";
        text.style.color = "green";
    }
}

function checkMatch(passId, confirmId, textId) {
    let pass = document.getElementById(passId).value;
    let confirm = document.getElementById(confirmId).value;
    let text = document.getElementById(textId);

    if (confirm.length === 0) {
        text.innerHTML = "";
    } else if (pass === confirm) {
        text.innerHTML = "Passwords match";
        text.style.color = "green";
    } else {
        text.innerHTML = "Passwords do not match";
        text.style.color = "red";
    }
}
</script>
</body>
</html>

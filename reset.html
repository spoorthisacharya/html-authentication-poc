<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Reset Password</h3>

        <form>

            <!-- New Password -->
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="resetPassword" class="form-control"
                       onkeyup="checkStrength('resetPassword','resetStrength')">
                <small id="resetStrength"></small>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="resetConfirm" class="form-control"
                       onkeyup="checkMatch('resetPassword','resetConfirm','resetMatch')">
                <small id="resetMatch"></small>
            </div>

            <!-- Update Button -->
            <button type="button" onclick="resetPassword()" class="btn btn-success w-100">
                Update Password
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="index.html">Back to Login</a>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Password Strength
function checkStrength(inputId, textId) {
    let password = document.getElementById(inputId).value;
    let text = document.getElementById(textId);

    if (password.length === 0) {
        text.innerHTML = "";
    } else if (password.length < 4) {
        text.innerHTML = "Weak";
        text.style.color = "red";
    } else if (password.length < 8) {
        text.innerHTML = "Medium";
        text.style.color = "orange";
    } else {
        text.innerHTML = "Strong";
        text.style.color = "green";
    }
}

// Password Match
function checkMatch(passId, confirmId, textId) {
    let pass = document.getElementById(passId).value;
    let confirm = document.getElementById(confirmId).value;
    let text = document.getElementById(textId);

    if (confirm.length === 0) {
        text.innerHTML = "";
    } else if (pass === confirm) {
        text.innerHTML = "Passwords match";
        text.style.color = "green";
    } else {
        text.innerHTML = "Passwords do not match";
        text.style.color = "red";
    }
}

// Reset Password Function
function resetPassword() {
    let newPassword = document.getElementById("resetPassword").value;
    let confirmPassword = document.getElementById("resetConfirm").value;

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    let user = JSON.parse(localStorage.getItem("user"));

    user.password = newPassword;

    localStorage.setItem("user", JSON.stringify(user));

    alert("Password updated successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>

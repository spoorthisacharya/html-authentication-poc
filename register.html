
<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Register</h3>

        <form>

            <!-- Name -->
            <input type="text" id="name" class="form-control mb-2" placeholder="Name">

            <!-- Email -->
            <input type="email" id="email" class="form-control mb-2" placeholder="Email">

            <!-- Phone -->
            <input type="tel" id="phone" class="form-control mb-2" placeholder="Phone">

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="regPassword" class="form-control"
                       onkeyup="checkStrength('regPassword','regStrength')">
                <small id="regStrength"></small>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="regConfirm" class="form-control"
                       onkeyup="checkMatch('regPassword','regConfirm','matchText')">
                <small id="matchText"></small>
            </div>

            <!-- Register Button -->
            <button type="button" onclick="registerUser()" class="btn btn-success w-100">
                Register
            </button>

        </form>

        <div class="text-center mt-2">
            <a href="index.html">Already have account?</a>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Password Strength
function checkStrength(inputId, textId) {
    let password = document.getElementById(inputId).value;
    let text = document.getElementById(textId);

    if (password.length === 0) {
        text.innerHTML = "";
    } else if (password.length < 4) {
        text.innerHTML = "Weak";
        text.style.color = "red";
    } else if (password.length < 8) {
        text.innerHTML = "Medium";
        text.style.color = "orange";
    } else {
        text.innerHTML = "Strong";
        text.style.color = "green";
    }
}

// Password Match
function checkMatch(passId, confirmId, textId) {
    let pass = document.getElementById(passId).value;
    let confirm = document.getElementById(confirmId).value;
    let text = document.getElementById(textId);

    if (confirm.length === 0) {
        text.innerHTML = "";
    } else if (pass === confirm) {
        text.innerHTML = "Passwords match";
        text.style.color = "green";
    } else {
        text.innerHTML = "Passwords do not match";
        text.style.color = "red";
    }
}

// Register Function
function registerUser() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("regPassword").value;
    let confirm = document.getElementById("regConfirm").value;

    if (password !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    let user = {
        name: name,
        email: email,
        phone: phone,
        password: password
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("Registration successful!");
    window.location.href = "index.html";
}
</script>

</body>
</html>

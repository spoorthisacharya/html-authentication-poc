
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Dashboard</span>
            <div>
                <button onclick="toggleDark()" class="btn btn-secondary me-2">Dark Mode</button>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Centered Content -->
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="text-center">
            <h2 id="welcomeText"></h2>
            <p class="text-muted">You are successfully logged in</p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Show Username
let user = JSON.parse(localStorage.getItem("user"));

if (user) {
    document.getElementById("welcomeText").innerText = "Welcome, " + user.name + "!";
} else {
    // If no user, redirect to login
    window.location.href = "index.html";
}

// Logout Function
function logout() {
    window.location.href = "index.html";
}

// Dark Mode
function toggleDark() {
    document.body.classList.toggle("dark-mode");

    let btn = event.target;
    if (btn.innerText === "Dark Mode") {
        btn.innerText = "Light Mode";
    } else {
        btn.innerText = "Dark Mode";
    }
}
</script>

</body>
</html>
